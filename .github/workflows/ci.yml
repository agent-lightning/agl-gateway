name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Lint UI
        working-directory: ui
        run: npm run lint

      - name: Test UI
        working-directory: ui
        run: npm run test

      - name: Build portal UI
        working-directory: ui
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          # Scope to tracked Go files so vendored Go under ui/node_modules is not checked.
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Bring up the ephemeral Postgres + ClickHouse so the single test run below exercises
      # every store backend combination — sqlite, postgres, sqlite+clickhouse,
      # postgres+clickhouse (see internal/store eachBackend) — selected by the two env vars.
      # TestClickHouseRejectedAsPrimary asserts the unsupported combination is rejected.
      - name: Start PostgreSQL + ClickHouse
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Test (race + coverage, all store backends)
        env:
          AGL_DATABASE: postgres://postgres:pw@localhost:65432/postgres?sslmode=disable
          AGL_CLICKHOUSE: clickhouse://default:@localhost:59000/default
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.test.yml down
