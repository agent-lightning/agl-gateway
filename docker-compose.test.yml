# Ephemeral PostgreSQL + ClickHouse for exercising the store backends locally and in CI.
#
# No volumes are declared: each database keeps its data only in the container's writable layer,
# which is discarded on `docker compose -f docker-compose.test.yml down`. Persistence is not
# needed — the store tests truncate the tables at the start of every run.
#
# Ports are deliberately uncommon so this does not collide with a Postgres/ClickHouse you may
# already be running locally. Bring the stack up, then point the store tests at it via the two
# env vars the gateway itself honors — a single `go test` run then exercises every supported
# backend combination (sqlite, postgres, sqlite+clickhouse, postgres+clickhouse):
#
#   docker compose -f docker-compose.test.yml up -d --wait
#   AGL_DATABASE=postgres://postgres:pw@localhost:65432/postgres?sslmode=disable \
#   AGL_CLICKHOUSE=clickhouse://default:@localhost:59000/default \
#     go test ./internal/store/...
#   docker compose -f docker-compose.test.yml down
name: agl-gateway-test

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: pw
    # 65432 → container 5432 (the conventional Postgres port).
    ports:
      - "65432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 40

  clickhouse:
    image: clickhouse:lts
    environment:
      # Single-node throwaway: no password on the default user.
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    # 59000 → native protocol (9000), 58123 → HTTP (8123).
    ports:
      - "59000:9000"
      - "58123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 2s
      timeout: 3s
      retries: 40
