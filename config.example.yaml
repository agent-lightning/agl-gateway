# agl-gateway example configuration.
# Copy to config.yaml and edit. Run with: gateway -config config.yaml

server:
  addr: ":8080"
  # Maximum proxied request body the gateway will buffer in memory (it is held so it can be
  # replayed across provider failover). Over-limit requests are rejected with 413 before any
  # upstream call. 0 applies the 100 MiB default; a negative value disables the limit.
  max_request_bytes: 104857600

# The single master key authenticates the /admin API and the web portal.
# Generate something long and random, e.g. `openssl rand -hex 32`. The AGL_MASTER_KEY
# environment variable overrides this — handy for keeping the secret out of this file.
master_key: "mk-change-me-to-a-long-random-secret"

# Persistence backend for api_keys (and, unless logs_database is set, request_logs too).
# A SQLite file path works for a single node, but this production example uses PostgreSQL:
# a postgres:// (or postgresql://) URL. The AGL_DATABASE environment variable overrides this
# — the bundled compose.yaml sets it to the postgres service so the password stays out of
# this file. Leave the placeholder here; supply the real DSN via AGL_DATABASE in production.
database: "postgres://agl:agl@localhost:5432/agl_gateway?sslmode=disable"

# Separate backend for request_logs, while api_keys stay in `database`. A clickhouse://
# (or clickhouses://) URL sends logs to ClickHouse — an append-only OLAP store suited to the
# high-volume, payload-heavy log analytics this example enables below. (A postgres:// URL or
# a file path are also accepted; empty co-locates logs with keys in `database`.) The
# AGL_LOGS_DATABASE environment variable overrides this — the bundled compose.yaml sets it to
# the clickhouse service so the password stays out of this file.
logs_database: "clickhouse://agl:agl@localhost:9000/agl_gateway"

# Default retry policy. Each upstream attempt that fails with a network error or an
# HTTP 429/5xx is retried up to max_retries times, waiting an exponential backoff
# (base_delay * 2^attempt, capped at max_delay) with full jitter between attempts.
defaults:
  retry:
    max_retries: 3
    base_delay: 200ms
    max_delay: 10s
  # Default log-retention policy for newly created keys (each key stores its own resolved
  # value, overridable per key via the create-key request / portal). false (the default)
  # cascade-deletes a key's request logs when the key is deleted; true retains them so usage
  # history outlives the key (the logs keep the key name captured at request time).
  keep_logs_on_key_delete: false

# Payload capture. Enabled in this production example so request_logs carry the original
# inbound request body and the final upstream response body, with SSE streams best-effort
# assembled for /v1/chat/completions, /v1/responses, and /v1/messages (unknown stream paths
# store the raw response stream). Bodies can contain secrets and grow the logs store quickly,
# so keep them on ClickHouse (logs_database above) and tune the per-body caps to your traffic.
# Set enabled: false to disable, or lower the byte caps to trim storage.
payload_capture:
  enabled: true
  max_request_bytes: 1048576
  max_response_bytes: 1048576
  assemble_streams: true
  max_assembled_bytes: 1048576

# Upstream providers. An API key is bound to one or more of these by name; each request
# is routed to a randomly chosen bound provider. The gateway forwards the original request
# path and body unchanged, replacing the client's Authorization header with the provider's
# api_key (or the headers below).
#
# IMPORTANT: base_url must be the bare origin (scheme + host + optional port) WITHOUT a
# path. The gateway appends the client's full request path verbatim, so the "/v1" comes
# from the client (e.g. /v1/chat/completions, /v1/messages). Include it here and you get a
# doubled path:
#   base_url: https://api.openai.com      + /v1/chat/completions -> .../v1/chat/completions  (correct)
#   base_url: https://api.openai.com/v1   + /v1/chat/completions -> .../v1/v1/chat/completions (wrong)
providers:
  - name: openai
    base_url: https://api.openai.com
    api_key: "sk-your-openai-key"
    # model_map rewrites the request's "model" before forwarding upstream. Both the
    # original and the mapped model are recorded in the request log.
    model_map:
      gpt-fast: gpt-5-mini
    # Optional per-provider retry override (unset fields fall back to defaults.retry).
    retry:
      max_retries: 5

  - name: anthropic
    base_url: https://api.anthropic.com
    # Anthropic authenticates with x-api-key, not a bearer token. Leave api_key empty and
    # supply credentials via headers, which are added to every upstream request.
    headers:
      x-api-key: "sk-ant-your-anthropic-key"
      anthropic-version: "2023-06-01"

  # A self-hosted, OpenAI-compatible upstream (vLLM, Ollama, LiteLLM, etc.).
  - name: local
    base_url: http://127.0.0.1:8000
    api_key: "not-needed"

# Per-model token pricing, used to compute the cost of each request. Field names mirror the
# new-api schema. Cached-token rates fall back to input_cost_per_token when omitted.
pricing:
  # --- OpenAI / GPT family ---
  - model: gpt-5-nano
    input_cost_per_token: 5e-8
    output_cost_per_token: 4e-7
    cache_read_input_token_cost: 5e-9
  - model: gpt-5-mini
    input_cost_per_token: 2.5e-7
    output_cost_per_token: 2e-6
    cache_read_input_token_cost: 2.5e-8
  - model: gpt-5.2
    input_cost_per_token: 1.75e-6
    output_cost_per_token: 1.4e-5
    cache_read_input_token_cost: 1.75e-7
  - model: gpt-5.3-codex
    input_cost_per_token: 1.75e-6
    output_cost_per_token: 1.4e-5
    cache_read_input_token_cost: 1.75e-7
  - model: gpt-5.4
    input_cost_per_token: 2.5e-6
    output_cost_per_token: 1.5e-5
    cache_read_input_token_cost: 2.5e-7
  - model: gpt-5.4-mini
    input_cost_per_token: 7.5e-7
    output_cost_per_token: 4.5e-6
    cache_read_input_token_cost: 7.5e-8
  - model: gpt-5.4-nano
    input_cost_per_token: 2e-7
    output_cost_per_token: 1.25e-6
    cache_read_input_token_cost: 2e-8
  - model: gpt-5.5
    input_cost_per_token: 5e-6
    output_cost_per_token: 3e-5
    cache_read_input_token_cost: 5e-7

  # --- Anthropic / Claude family (cache_creation = 5-minute cache write rate) ---
  - model: claude-opus-4-8
    input_cost_per_token: 5e-6
    output_cost_per_token: 2.5e-5
    cache_read_input_token_cost: 5e-7
    cache_creation_input_token_cost: 6.25e-6
  - model: claude-opus-4-7
    input_cost_per_token: 5e-6
    output_cost_per_token: 2.5e-5
    cache_read_input_token_cost: 5e-7
    cache_creation_input_token_cost: 6.25e-6
  - model: claude-opus-4-6
    input_cost_per_token: 5e-6
    output_cost_per_token: 2.5e-5
    cache_read_input_token_cost: 5e-7
    cache_creation_input_token_cost: 6.25e-6
  - model: claude-sonnet-4-6
    input_cost_per_token: 3e-6
    output_cost_per_token: 1.5e-5
    cache_read_input_token_cost: 3e-7
    cache_creation_input_token_cost: 3.75e-6
  - model: claude-haiku-4-5
    input_cost_per_token: 1e-6
    output_cost_per_token: 5e-6
    cache_read_input_token_cost: 1e-7
    cache_creation_input_token_cost: 1.25e-6
  - model: claude-haiku-4-5-20251001
    input_cost_per_token: 1e-6
    output_cost_per_token: 5e-6
    cache_read_input_token_cost: 1e-7
    cache_creation_input_token_cost: 1.25e-6
