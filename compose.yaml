# Example Docker Compose for agl-gateway.
#
#   1. cp config.example.yaml config.yaml   # then edit master_key, providers, pricing
#   2. docker compose up -d
#   3. open http://localhost:26016/portal
#
# config.yaml is mounted read-only; the SQLite database persists in the named volume.

services:
  gateway:
    # Pin the published image, or build from the repo instead:
    #   build: .
    #   image: agl-gateway
    image: ghcr.io/agent-lightning/agl-gateway:latest
    ports:
      - "26016:8080"
    volumes:
      - ./config.yaml:/data/config.yaml:ro
      - agl-data:/data
    restart: unless-stopped

volumes:
  agl-data:
